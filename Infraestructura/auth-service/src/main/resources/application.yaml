server:
  port: 8088

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:http://localhost:8089"

  datasource:
    url: jdbc:mysql://localhost:3307/usuario_db
    username: root
    password: mysql123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
